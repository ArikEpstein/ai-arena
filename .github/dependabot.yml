version: 2
updates:
  # npm dependencies — small dep set, so low PR volume and high signal.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: development
    labels:
      - dependencies

  # GitHub Actions used in CI.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - dependencies
      - ci
